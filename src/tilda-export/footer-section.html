<style>
.footer-azezm {
  background: #1A1F3A;
  border-top: 1px solid rgba(212, 175, 55, 0.2);
  padding: 3rem 1.5rem;
  color: #FFFFFF;
}

.footer-azezm__container {
  max-width: 1280px;
  margin: 0 auto;
}

.footer-azezm__grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 3rem;
  margin-bottom: 3rem;
}

/* Колонка бренда */
.footer-azezm__brand {
  grid-column: 1 / 2;
}

.footer-azezm__logo-wrapper {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1rem;
}

.footer-azezm__logo {
  height: 2rem;
  width: auto;
}

.footer-azezm__brand-name {
  font-family: Georgia, serif;
  font-size: 1.5rem;
  letter-spacing: 0.1em;
  color: #FFFFFF;
}

.footer-azezm__tagline {
  color: rgba(255, 255, 255, 0.6);
  font-size: 0.875rem;
  line-height: 1.6;
}

/* Заголовки колонок */
.footer-azezm__column-title {
  color: #D4AF37;
  font-size: 1rem;
  margin-bottom: 1rem;
  font-weight: 500;
}

/* Ссылки */
.footer-azezm__links {
  list-style: none;
  padding: 0;
  margin: 0;
}

.footer-azezm__link-item {
  margin-bottom: 0.75rem;
}

.footer-azezm__link {
  color: rgba(255, 255, 255, 0.6);
  text-decoration: none;
  font-size: 0.875rem;
  transition: color 0.3s ease;
}

.footer-azezm__link:hover {
  color: #FFFFFF;
}

/* Контакты */
.footer-azezm__contact-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.75rem;
}

.footer-azezm__contact-icon {
  width: 1rem;
  height: 1rem;
  color: #D4AF37;
}

.footer-azezm__contact-link {
  color: rgba(255, 255, 255, 0.6);
  text-decoration: none;
  font-size: 0.875rem;
  transition: color 0.3s ease;
}

.footer-azezm__contact-link:hover {
  color: #FFFFFF;
}

/* Копирайт */
.footer-azezm__bottom {
  padding-top: 2rem;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
  text-align: center;
}

.footer-azezm__copyright {
  color: rgba(255, 255, 255, 0.4);
  font-size: 0.875rem;
}

/* Адаптив для планшетов */
@media (max-width: 1024px) {
  .footer-azezm__grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 2rem;
  }
  
  .footer-azezm__brand {
    grid-column: 1 / 3;
  }
}

/* Адаптив для мобильных */
@media (max-width: 768px) {
  .footer-azezm {
    padding: 2rem 1rem;
  }
  
  .footer-azezm__grid {
    grid-template-columns: 1fr;
    gap: 2rem;
    margin-bottom: 2rem;
  }
  
  .footer-azezm__brand {
    grid-column: 1;
  }
}
</style>
