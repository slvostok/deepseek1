╔═══════════════════════════════════════════════════════════════════╗
║  FRAME 1: HERO SECTION - АЗЬ ЕСЬМ                                ║
║  Размер: 1200px × 800px                                           ║

╚═══════════════════════════════════════════════════════════════════╝
-->

<style>
/* ═══ HERO FRAME - 1200×800 ═══ */
.hero-frame {
  position: relative;
  width: 1200px;
  height: 800px;
  margin: 0 auto;
  background: #000000;
  overflow: hidden;
}

/* Фоновое изображение */
.hero-frame__bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  z-index: 1;
}

/* Градиент поверх фона */
.hero-frame__overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.5), #000000);
  z-index: 2;
}

/* Контент (центрированный контейнер) */
.hero-frame__content {
  position: relative;
  z-index: 10;
  width: 1120px; /* 1200 - 80px отступы */
  height: 100%;
  margin: 0 auto;
  padding: 0 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Логотип */
.hero-frame__logo {
  width: 200px;
  height: 200px;
  margin-bottom: 40px;
  animation: fadeInUp 1.5s ease-out;
}

/* Заголовок */
.hero-frame__title {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 96px;
  color: #FFFFFF;
  margin: 0 0 32px 0;
  letter-spacing: 0.2em;
  line-height: 1.2;
  font-weight: normal;
  text-align: center;
  width: 100%;
  animation: fadeInUp 1.5s ease-out 0.2s backwards;
}

/* Подзаголовок */
.hero-frame__subtitle {
  font-size: 24px;
  color: rgba(255, 255, 255, 0.8);
  margin: 0 0 48px 0;
  text-align: center;
  width: 100%;
  line-height: 1.6;
  animation: fadeInUp 1.5s ease-out 0.4s backwards;
}

/* Кнопка CTA */
.hero-frame__cta {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 280px;
  height: 56px;
  background: #D4AF37;
  color: #000000;
  padding: 16px 40px;
  border-radius: 8px;
  font-weight: 500;
  font-size: 18px;
  letter-spacing: 0.05em;
  text-decoration: none;
  transition: all 0.3s ease;
  animation: fadeInUp 1.5s ease-out 0.6s backwards;
}

.hero-frame__cta:hover {
  background: #B89520;
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
}

.hero-frame__cta-arrow {
  width: 20px;
  height: 20px;
  transition: transform 0.3s ease;
}

.hero-frame__cta:hover .hero-frame__cta-arrow {
  transform: translateX(5px);
}

/* Анимации */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Адаптив для мобильных (если будет использоваться) */
@media (max-width: 768px) {
  .hero-frame {
    width: 100%;
    height: 100vh;
    min-height: 600px;
  }
  
  .hero-frame__content {
    width: 100%;
    padding: 0 20px;
  }
  
  .hero-frame__logo {
    width: 120px;
    height: 120px;
    margin-bottom: 24px;
  }
  
  .hero-frame__title {
    font-size: 56px;
    letter-spacing: 0.1em;
    margin-bottom: 20px;
  }
  
  .hero-frame__subtitle {
    font-size: 18px;
    margin-bottom: 32px;
  }
  
  .hero-frame__cta {
    width: auto;
    padding: 14px 32px;
    font-size: 16px;
  }
}
</style>

<!-- HTML структура фрейма -->
<div class="hero-frame">
  <!-- Фоновое изображение (замените URL) -->
  <div class="hero-frame__bg" style="background-image: url('https://images.unsplash.com/photo-1558769132-cb1aea3c9a8e?w=1920&h=1080&fit=crop&q=85');"></div>
  
  <!-- Градиентный оверлей -->
  <div class="hero-frame__overlay"></div>
  
  <!-- Контент -->
  <div class="hero-frame__content">
    <!-- Логотип (замените на ваш) -->
    <svg class="hero-frame__logo" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="98" stroke="#D4AF37" stroke-width="4"/>
      <text x="100" y="120" font-family="Georgia, serif" font-size="60" fill="#D4AF37" text-anchor="middle">АЗЬ</text>
    </svg>
    
    <!-- Заголовок -->
    <h1 class="hero-frame__title">АЗЬ ЕСЬМ</h1>
    
    <!-- Подзаголовок -->
    <p class="hero-frame__subtitle">
      Русская идентичность в современной уличной одежде
    </p>
    
    <!-- Кнопка -->
    <a href="#catalog" class="hero-frame__cta">
      <span>Смотреть коллекцию</span>
      <svg class="hero-frame__cta-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>
  </div>
</div>
